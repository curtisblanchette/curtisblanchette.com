<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>cb-site-kit · Hero · editorial type</title>
<link rel="stylesheet" href="../tokens.css" />
<link rel="stylesheet" href="../components.css" />
<style>
  /* Preview shell — DO NOT copy. Only the markup below <main> is the component. */
  body { background: var(--bg-1); }
  .cb-preview { padding: 48px var(--gutter); }
  .cb-preview > * + * { margin-top: 56px; }
  .cb-preview-label {
    font-family: var(--font-mono); font-size: 11px;
    letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--fg-2); margin-bottom: 16px;
  }
</style>
</head>
<body class="">
<main class="cb-preview">

  <section class="cb-hero cb-hero--editorial">
    <div class="cb-container cb-container--bleed">
      <h1 class="cb-hero__name">Curtis<br/>Blanchette<em>,</em><br/>builds&nbsp;systems.</h1>
      <div class="cb-hero__meta">
        <div class="cb-hero__meta-cell">
          <span class="cb-hero__meta-label">Role</span>
          <span class="cb-hero__meta-value">Lead Software Engineer</span>
        </div>
        <div class="cb-hero__meta-cell">
          <span class="cb-hero__meta-label">Based</span>
          <span class="cb-hero__meta-value">Victoria, BC — <span class="cb-mono">UTC−8</span></span>
        </div>
        <div class="cb-hero__meta-cell">
          <span class="cb-hero__meta-label">Focus</span>
          <span class="cb-hero__meta-value">Platform · Developer tooling · DX</span>
        </div>
        <div class="cb-hero__meta-cell">
          <span class="cb-hero__meta-label">Status</span>
          <span class="cb-hero__meta-value"><i class="cb-dot"></i>&nbsp; Open to <span class="cb-mono">staff</span> conversations</span>
        </div>
      </div>
    </div>
  </section>

</main>
</body>
</html>
