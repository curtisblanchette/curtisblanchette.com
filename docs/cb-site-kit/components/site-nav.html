<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>cb-site-kit · Site nav</title>
<link rel="stylesheet" href="../tokens.css" />
<link rel="stylesheet" href="../components.css" />
<style>
  /* Preview shell — DO NOT copy. Only the markup below <main> is the component. */
  body { background: var(--bg-1); }
  .cb-preview { padding: 48px var(--gutter); }
  .cb-preview > * + * { margin-top: 56px; }
  .cb-preview-label {
    font-family: var(--font-mono); font-size: 11px;
    letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--fg-2); margin-bottom: 16px;
  }
</style>
</head>
<body class="">
<main class="cb-preview">

  <nav class="cb-nav">
    <div class="cb-nav__inner">
      <a href="/" class="cb-nav__brand">
        <b>Curtis Blanchette</b>
        <span>— Lead software engineer</span>
      </a>
      <div class="cb-nav__center">
        <span class="cb-pill"><i class="cb-dot"></i> Currently shipping</span>
      </div>
      <div class="cb-nav__links">
        <a href="/work">Work</a>
        <a href="/writing">Writing</a>
        <a href="/now">Now</a>
        <a href="/contact" class="cb-btn cb-btn--ghost cb-btn--sm">Get in touch <span class="cb-arrow">↗</span></a>
      </div>
    </div>
  </nav>
  <div style="padding:96px 0;text-align:center;color:var(--fg-2);font-family:var(--font-mono);font-size:12px;letter-spacing:.1em;text-transform:uppercase">↑ Sticky · 64px · hairline border</div>

</main>
</body>
</html>
