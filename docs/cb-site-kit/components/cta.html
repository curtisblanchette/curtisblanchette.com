<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>cb-site-kit · CTA block</title>
<link rel="stylesheet" href="../tokens.css" />
<link rel="stylesheet" href="../components.css" />
<style>
  /* Preview shell — DO NOT copy. Only the markup below <main> is the component. */
  body { background: var(--bg-1); }
  .cb-preview { padding: 48px var(--gutter); }
  .cb-preview > * + * { margin-top: 56px; }
  .cb-preview-label {
    font-family: var(--font-mono); font-size: 11px;
    letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--fg-2); margin-bottom: 16px;
  }
</style>
</head>
<body class="">
<main class="cb-preview">

  <section class="cb-section cb-hairline">
    <div class="cb-container cb-container--bleed">
      <div class="cb-cta">
        <h2 class="cb-cta__heading">Got something that <em>shouldn't</em> break? Let's talk.</h2>
        <p class="cb-cta__lede">Currently open to staff &amp; principal-level conversations. I read every note I get; expect a reply within a day or two.</p>
        <div style="display:flex;gap:12px;flex-wrap:wrap">
          <a href="mailto:curtis@example.com" class="cb-btn cb-btn--primary">curtis@example.com <span class="cb-arrow">↗</span></a>
          <a href="https://github.com/curtisblanchette" class="cb-btn cb-btn--ghost">github.com/curtisblanchette <span class="cb-arrow">↗</span></a>
        </div>
      </div>
    </div>
  </section>

</main>
</body>
</html>
