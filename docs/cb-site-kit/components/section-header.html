<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>cb-site-kit · Section header</title>
<link rel="stylesheet" href="../tokens.css" />
<link rel="stylesheet" href="../components.css" />
<style>
  /* Preview shell — DO NOT copy. Only the markup below <main> is the component. */
  body { background: var(--bg-1); }
  .cb-preview { padding: 48px var(--gutter); }
  .cb-preview > * + * { margin-top: 56px; }
  .cb-preview-label {
    font-family: var(--font-mono); font-size: 11px;
    letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--fg-2); margin-bottom: 16px;
  }
</style>
</head>
<body class="">
<main class="cb-preview">

  <section class="cb-section-sm">
    <div class="cb-container cb-container--wide">
      <header class="cb-section-header">
        <div>
          <span class="cb-section-header__num">02</span>
          <span class="cb-section-header__label">Selected work</span>
        </div>
        <div>
          <h2 class="cb-section-header__title">Four projects I'd be happy to be remembered for.</h2>
          <p class="cb-section-header__sub">Each one shipped. Each one is still in production. The full list is longer than is interesting to read.</p>
        </div>
      </header>
    </div>
  </section>

</main>
</body>
</html>
