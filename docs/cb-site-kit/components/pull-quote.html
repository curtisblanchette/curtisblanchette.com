<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>cb-site-kit · Pull quote</title>
<link rel="stylesheet" href="../tokens.css" />
<link rel="stylesheet" href="../components.css" />
<style>
  /* Preview shell — DO NOT copy. Only the markup below <main> is the component. */
  body { background: var(--bg-1); }
  .cb-preview { padding: 48px var(--gutter); }
  .cb-preview > * + * { margin-top: 56px; }
  .cb-preview-label {
    font-family: var(--font-mono); font-size: 11px;
    letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--fg-2); margin-bottom: 16px;
  }
</style>
</head>
<body class="">
<main class="cb-preview">

  <section class="cb-section">
    <div class="cb-container cb-container--medium">
      <figure class="cb-pullquote">
        <blockquote class="cb-quote">
          "Curtis is the engineer you put on the things that aren't allowed to break. He works quietly, he leaves the code better than he found it, and he makes the rest of the team faster."
        </blockquote>
        <figcaption class="cb-pullquote__attr">— Jamie Park · VP Engineering · Helix</figcaption>
      </figure>
    </div>
  </section>

</main>
</body>
</html>
