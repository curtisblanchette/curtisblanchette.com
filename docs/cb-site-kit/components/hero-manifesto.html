<main class="cb-preview">

  <section class="cb-hero cb-hero--manifesto">

      <div style="margin-top:64px;display:flex;gap:12px;flex-wrap:wrap">
        <a href="#" class="cb-btn cb-btn--primary">Get in touch <span class="cb-arrow">↗</span></a>
