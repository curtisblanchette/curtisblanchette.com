<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>cb-site-kit · Project list (compact density)</title>
<link rel="stylesheet" href="../tokens.css" />
<link rel="stylesheet" href="../components.css" />
<style>
  /* Preview shell — DO NOT copy. Only the markup below <main> is the component. */
  body { background: var(--bg-1); }
  .cb-preview { padding: 48px var(--gutter); }
  .cb-preview > * + * { margin-top: 56px; }
  .cb-preview-label {
    font-family: var(--font-mono); font-size: 11px;
    letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--fg-2); margin-bottom: 16px;
  }
</style>
</head>
<body class="">
<main class="cb-preview">

  <section class="cb-section-sm">
    <div class="cb-container cb-container--wide">
      <div class="cb-project-list">
        <a href="#" class="cb-project-row">
          <span class="cb-project-row__num">01</span>
          <h3 class="cb-project-row__title">Helix — <em>a platform</em> that moves with the shift</h3>
          <span class="cb-project-row__meta">Lead engineer · 2024 →</span>
          <span class="cb-project-row__arrow">↗</span>
        </a>
        <a href="#" class="cb-project-row">
          <span class="cb-project-row__num">02</span>
          <h3 class="cb-project-row__title">Orbit — background-job <em>infra</em> for a 200-engineer org</h3>
          <span class="cb-project-row__meta">Founding eng · 2023</span>
          <span class="cb-project-row__arrow">↗</span>
        </a>
        <a href="#" class="cb-project-row">
          <span class="cb-project-row__num">03</span>
          <h3 class="cb-project-row__title">Ledger CLI — measuring DX <em>honestly</em></h3>
          <span class="cb-project-row__meta">Solo · OSS · 2022</span>
          <span class="cb-project-row__arrow">↗</span>
        </a>
        <a href="#" class="cb-project-row">
          <span class="cb-project-row__num">04</span>
          <h3 class="cb-project-row__title">Field Notes — a <em>newsletter</em> for quiet engineers</h3>
          <span class="cb-project-row__meta">Editor · 2018 — 2021</span>
          <span class="cb-project-row__arrow">↗</span>
        </a>
      </div>
    </div>
  </section>

</main>
</body>
</html>
